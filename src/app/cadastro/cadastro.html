<h2>Cadastro de Cliente</h2>

<form>

<label>Nome</label><br>
<input type="text" [(ngModel)]="cliente.nome" name="nome"><br><br>

<label>Email</label><br>
<input type="email" [(ngModel)]="cliente.email" name="email"><br><br>

<label>Senha</label><br>
<input type="password" [(ngModel)]="cliente.senha" name="senha"><br><br>

<label>Telefone</label><br>
<input type="text" [(ngModel)]="cliente.telefone" name="telefone"><br><br>

<button type="button" (click)="salvar()">Cadastrar</button>

</form>
